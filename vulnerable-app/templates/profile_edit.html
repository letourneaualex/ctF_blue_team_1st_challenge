<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Profile — SecureBox</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
  textarea { display:block; width:100%; height:120px; padding:8px; margin:8px 0 16px; box-sizing:border-box; }
  button { padding:10px 24px; background:#333; color:#fff; border:none; cursor:pointer; border-radius:4px; }
</style>
</head>
<body>
<h2>Edit Profile</h2>
<form method="POST" action="/profile/edit">
  <label>Bio</label>
  <textarea name="bio" placeholder="Tell us about yourself…"></textarea>
  <button type="submit">Save</button>
</form>
<p><a href="/">Cancel</a></p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload — SecureBox</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
  input[type=file] { display:block; margin: 12px 0; }
  button { padding:10px 24px; background:#333; color:#fff; border:none; cursor:pointer; border-radius:4px; }
</style>
</head>
<body>
<h2>Upload File</h2>
<form method="POST" enctype="multipart/form-data">
  <input type="file" name="file">
  <button type="submit">Upload</button>
</form>
<p><a href="/">Back</a></p>
</body>
</html>

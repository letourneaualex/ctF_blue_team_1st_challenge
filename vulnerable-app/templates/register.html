<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register — SecureBox</title>
<style>
  body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
  input { display:block; width:100%; padding:8px; margin:8px 0 16px; box-sizing:border-box; }
  button { padding:10px 24px; background:#333; color:#fff; border:none; cursor:pointer; border-radius:4px; }
  .error { color:red; margin-bottom:12px; }
</style>
</head>
<body>
<h2>Create Account</h2>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="POST">
  <label>Username</label>
  <input type="text" name="username" autocomplete="off">
  <label>Email</label>
  <input type="email" name="email">
  <label>Password</label>
  <input type="password" name="password">
  <button type="submit">Register</button>
</form>
<p><a href="/login">Already have an account?</a></p>
</body>
</html>
